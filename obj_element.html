<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  background: black;
  padding: 10px;
  font-family: Arial, sans-serif;
  color: lime;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.cam {
  position: relative;
  width: 100%;
  height: 180px;
  background: black;
  border: 2px solid #111;
  overflow: hidden;
  filter: grayscale(100%) contrast(120%);
}

.cam iframe,
.cam video {
  width: 100%;
  height: 100%;
  border: none;
  object-fit: cover;
}

.label {
  position: absolute;
  top: 6px;
  left: 6px;
  background: rgba(0,0,0,0.65);
  color: lime;
  font-size: 11px;
  padding: 3px 6px;
  z-index: 2;
  letter-spacing: 1px;
}

.time {
  position: absolute;
  bottom: 6px;
  right: 6px;
  background: rgba(0,0,0,0.65);
  color: red;
  font-size: 11px;
  padding: 3px 6px;
  z-index: 2;
}
</style>
</head>

<body>

<div class="grid">

  <iframe src="https://www.youtube.com/embed/IPRDnt-YrgY"
        allow="autoplay; encrypted-media"
        allowfullscreen></iframe>

  <div class="cam">
    <div class="label">CAM 02 — CHALLENGER</div>
    <div class="time">LIVE ARCHIVE</div>
    <iframe src="https://www.youtube.com/embed/VIDEO_ID_2" allowfullscreen></iframe>
  </div>

  <div class="cam">
    <div class="label">CAM 03 — OJ CHASE</div>
    <div class="time">LIVE ARCHIVE</div>
    <iframe src="https://www.youtube.com/embed/VIDEO_ID_3" allowfullscreen></iframe>
  </div>

  <div class="cam">
    <div class="label">CAM 04 — KATRINA</div>
    <div class="time">LIVE ARCHIVE</div>
    <iframe src="https://www.youtube.com/embed/VIDEO_ID_4" allowfullscreen></iframe>
  </div>

  <div class="cam">
    <div class="label">CAM 05 — YOU</div>
    <div class="time">LIVE NOW</div>
    <video id="userCam" autoplay muted playsinline></video>
  </div>

  <div class="cam">
    <div class="label">CAM 06 — MOON LANDING</div>
    <div class="time">LIVE ARCHIVE</div>
    <iframe src="https://www.youtube.com/embed/VIDEO_ID_5" allowfullscreen></iframe>
  </div>

  <div class="cam">
    <div class="label">CAM 07 — JAN 6</div>
    <div class="time">LIVE ARCHIVE</div>
    <iframe src="https://www.youtube.com/embed/VIDEO_ID_6" allowfullscreen></iframe>
  </div>

  <div class="cam">
    <div class="label">CAM 08 — BLACKOUT</div>
    <div class="time">LIVE ARCHIVE</div>
    <iframe src="https://www.youtube.com/embed/VIDEO_ID_7" allowfullscreen></iframe>
  </div>

  <div class="cam">
    <div class="label">CAM 09 — ELECTION NIGHT</div>
    <div class="time">LIVE ARCHIVE</div>
    <iframe src="https://www.youtube.com/embed/VIDEO_ID_8" allowfullscreen></iframe>
  </div>

  <div class="cam">
    <div class="label">CAM 10 — PROTEST</div>
    <div class="time">LIVE ARCHIVE</div>
    <iframe src="https://www.youtube.com/embed/VIDEO_ID_9" allowfullscreen></iframe>
  </div>

</div>

<script>
navigator.mediaDevices.getUserMedia({ video: true })
.then(function(stream) {
  document.getElementById("userCam").srcObject = stream;
})
.catch(function(error) {
  console.log("Camera access denied", error);
});
</script>

</body>
</html>
