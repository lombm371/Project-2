<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .home-button {
      position: relative;
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: pointer;
    }

    .home-button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .enter-text {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: Arial, sans-serif;
      font-size: 24px;
      background: rgba(0,0,0,0.5);
      padding: 12px 20px;
      border: 1px solid white;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <a href="index.html" class="home-button">
    <img src="video archive/9.jpeg" alt="Enter Site">
    <div class="enter-text">CLICK TO ENTER</div>
  </a>

</body>
</html>
